[INPUT_PG]
TABLE_EXEC_HISTORY = public.execution_history
TABLE_PROCESS_CATALOG = public.process_catalog

[IMPALA_CONNECTION]
HOST = impala.host.local
PORT = 21000

[KERBEROS]
USER = kerberos_user
