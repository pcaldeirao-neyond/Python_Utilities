[POSTGRE_CONNECTION]
DB = your_database
USER = your_user
PASSWORD = your_password
HOST = your_host
PORT = 5432

[LOGGER]
LEVEL = INFO
FORMATTER = %(asctime)s:%(levelname)s:%(filename)s:%(message)s

[PROP_FILES]
